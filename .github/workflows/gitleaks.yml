name: Gitleaks

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 để gitleaks quét toàn bộ lịch sử commit, không chỉ HEAD
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE chỉ cần cho GitHub Organization (miễn phí với repo cá nhân/public).
          # Nếu repo thuộc org, tạo secret GITLEAKS_LICENSE rồi bỏ comment dòng dưới:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
