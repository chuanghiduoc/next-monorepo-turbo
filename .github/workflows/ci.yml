name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1
  SKIP_ENV_VALIDATION: 1
  # Placeholder URLs so metadata/sitemap/robots resolve during the build.
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  BACKEND_URL: http://localhost:4000

jobs:
  # Dependency vulnerability gate. Replaces `pnpm audit`, whose npm advisory
  # endpoint was retired (410); osv-scanner reads pnpm-lock.yaml against the OSV
  # database and fails the build on any known vulnerability.
  security-audit:
    name: dependency audit (osv-scanner)
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --lockfile=./pnpm-lock.yaml
      fail-on-vuln: true

  lint:
    name: lint • knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-lint-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-lint-${{ github.ref_name }}-
            turbo-lint-
      - name: Lint
        run: pnpm lint
      # Gate unused files/deps/exports. Binaries are excluded: knip misreads the
      # husky hook scripts (`pnpm typecheck`/`test`) as unlisted binaries.
      - name: Knip (unused files/deps/exports)
        run: pnpm exec knip --exclude binaries

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-typecheck-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-typecheck-${{ github.ref_name }}-
            turbo-typecheck-
      - name: Typecheck
        run: pnpm typecheck

  test:
    name: unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ github.ref_name }}-
            turbo-test-
      - name: Unit tests with coverage
        run: pnpm test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/*/coverage
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-build-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-build-${{ github.ref_name }}-
            turbo-build-
      - name: Build
        run: pnpm build
